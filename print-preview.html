<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Previzualizare Fișă CST</title>

    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700&family=Work+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/common.css" />
    <link rel="stylesheet" href="assets/css/print-preview.css" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  </head>
  <body class="theme-black">
    <div class="toolbar">
      <button onclick="window.print()" class="btn-print">Printează Fișa</button>
      <button id="toggle-themes" class="btn-back">Schimbă Tema</button>
      <div class="tfill"></div>
      <button onclick="window.close()" class="btn-back">Închide Previzualizarea</button>
    </div>

    <div class="header">
      <div class="header-text">
        <p>SEMINAR DE PREDICARE EXPOZITIVĂ</p>
        <h1>FIȘĂ DE LUCRU PENTRU PREGĂTIREA PREDICII</h1>
      </div>
      <img src="https://cst-media.s3.amazonaws.com/graphic/cst-logo-black-web.jpg" alt="CST Logo" />
    </div>

    <div id="preview-content">
      <!-- Content will be rendered here by JS -->
    </div>

    <footer>
      <div class="footer-text">
        <div class="date">
          Completat cu <a href="https://fisa.predicare-expozitiva.ro" target="_blank">fisa.predicare-expozitiva.ro</a>
        </div>
        <div class="copyright">Charles Simeon Trust &copy; 2026</div>
      </div>
      <img src="https://cst-media.s3.amazonaws.com/graphic/cst-logo-black-web.jpg" alt="CST Logo" />
    </footer>

    <!-- External Libs -->
    <script src="assets/external/marked.min.js"></script>
    <script src="assets/external/dompurify.min.js"></script>

    <!-- App Scripts -->
    <script src="assets/js/utilities.js"></script>
    <script src="assets/js/fisa-utilities.js"></script>
    <script src="assets/js/print-preview.js"></script>
  </body>
</html>
